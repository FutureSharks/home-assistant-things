# ===================================================================
# Button mapping:
#   Button 1 single press  → power on
#   Button 1 long press    → brightness up (continuously while held)
#   Button 1 long release  → stop brightness up
#   Button 1 double press  → next pastel colour
#   Button 2 single press  → power off
#   Button 2 long press    → brightness down (continuously while held)
#   Button 2 long release  → stop brightness down
#   Button 2 double press  → previous pastel colour
# ===================================================================

blueprint:
  name: IKEA BILRESA + VARMBLIXT (Matter)
  description: >
    Controls an IKEA VARMBLIXT RGBW light using the IKEA BILRESA E2489 Matter
    dual-button remote. Button 1 turns the light on (single press), continuously
    increases brightness while held (long press), or cycles to the next pastel
    colour (double press). Button 2 turns the light off (single press),
    continuously decreases brightness while held (long press), or cycles to the
    previous pastel colour (double press).
  domain: automation
  author: max.williams
  homeassistant:
    min_version: 2025.12.1

  input:
    button1_event:
      name: Button 1 – Event Entity
      description: >
        Select the event entity for Button 1 (for example:
        event.bilresa_dual_button_button_1_2).
      selector:
        entity:
          domain: event

    button2_event:
      name: Button 2 – Event Entity
      description: >
        Select the event entity for Button 2 (for example:
        event.bilresa_dual_button_button_2_2).
      selector:
        entity:
          domain: event

    varmblixt_light:
      name: VARMBLIXT Light
      description: >
        Select the IKEA VARMBLIXT light entity to control.
      selector:
        entity:
          domain: light

    brightness_step:
      name: Brightness Step (%)
      description: >
        How much to increase or decrease brightness on each repeat tick while
        the button is held (1–20). Smaller values give smoother dimming.
      default: 5
      selector:
        number:
          min: 1
          max: 20
          unit_of_measurement: "%"
          mode: slider

    repeat_delay_ms:
      name: Repeat Delay (ms)
      description: >
        How long to wait between each brightness step while the button is held
        (100–1000 ms). Lower values dim faster; higher values dim slower.
      default: 300
      selector:
        number:
          min: 100
          max: 1000
          unit_of_measurement: "ms"
          mode: slider

# ===================================================================
# AUTOMATION LOGIC
# ===================================================================

variables:
  light_entity: !input varmblixt_light
  brightness_step_val: !input brightness_step
  repeat_delay_val: !input repeat_delay_ms
  # Pastel RGB colours to cycle through
  pastel_colours:
    - [255, 179, 186]   # pastel pink
    - [255, 204, 153]   # pastel peach
    - [255, 255, 179]   # pastel yellow
    - [179, 255, 179]   # pastel green
    - [179, 230, 255]   # pastel sky blue
    - [179, 196, 255]   # pastel periwinkle
    - [220, 179, 255]   # pastel lavender
    - [255, 179, 230]   # pastel rose

trigger:
  - platform: state
    id: button1
    entity_id: !input button1_event
    not_from: "unavailable"
    not_to: "unavailable"
  - platform: state
    id: button2
    entity_id: !input button2_event
    not_from: "unavailable"
    not_to: "unavailable"

condition: []

action:
  - variables:
      press_type: "{{ trigger.to_state.attributes.event_type }}"
      trigger_id: "{{ trigger.id }}"
      current_rgb: "{{ state_attr(light_entity, 'rgb_color') or [255, 179, 186] }}"
      # Find the index of the closest pastel colour by minimising squared RGB distance
      current_idx: >
        {% set ns = namespace(idx=0, best=999999999) %}
        {% for c in pastel_colours %}
          {% set dist = (c[0] - current_rgb[0])**2 + (c[1] - current_rgb[1])**2 + (c[2] - current_rgb[2])**2 %}
          {% if dist < ns.best %}
            {% set ns.best = dist %}
            {% set ns.idx = loop.index0 %}
          {% endif %}
        {% endfor %}
        {{ ns.idx }}

  - choose:

      # -------------------------------------------------------------
      # BUTTON 1 – SINGLE PRESS → power on
      # -------------------------------------------------------------
      - conditions:
          - condition: template
            value_template: >
              {{ trigger_id == 'button1' and press_type == 'multi_press_1' }}
        sequence:
          - action: light.turn_on
            target:
              entity_id: !input varmblixt_light

      # -------------------------------------------------------------
      # BUTTON 1 – LONG PRESS → brightness up (repeat until release)
      # -------------------------------------------------------------
      - conditions:
          - condition: template
            value_template: >
              {{ trigger_id == 'button1' and press_type == 'long_press' }}
        sequence:
          - repeat:
              count: 100  # safety cap; mode: restart stops this on long_release
              sequence:
                - action: light.turn_on
                  target:
                    entity_id: !input varmblixt_light
                  data:
                    brightness_step_pct: "{{ brightness_step_val | int }}"
                - delay:
                    milliseconds: "{{ repeat_delay_val | int }}"

      # -------------------------------------------------------------
      # BUTTON 1 – LONG RELEASE → stop (mode: restart cancels the loop)
      # -------------------------------------------------------------
      - conditions:
          - condition: template
            value_template: >
              {{ trigger_id == 'button1' and press_type == 'long_release' }}
        sequence: []

      # -------------------------------------------------------------
      # BUTTON 1 – DOUBLE PRESS → next pastel colour
      # -------------------------------------------------------------
      - conditions:
          - condition: template
            value_template: >
              {{ trigger_id == 'button1' and press_type == 'multi_press_2' }}
        sequence:
          - action: light.turn_on
            target:
              entity_id: !input varmblixt_light
            data:
              rgb_color: >
                {{ pastel_colours[(current_idx + 1) % (pastel_colours | length)] }}

      # -------------------------------------------------------------
      # BUTTON 2 – SINGLE PRESS → power off
      # -------------------------------------------------------------
      - conditions:
          - condition: template
            value_template: >
              {{ trigger_id == 'button2' and press_type == 'multi_press_1' }}
        sequence:
          - action: light.turn_off
            target:
              entity_id: !input varmblixt_light

      # -------------------------------------------------------------
      # BUTTON 2 – LONG PRESS → brightness down (repeat until release)
      # -------------------------------------------------------------
      - conditions:
          - condition: template
            value_template: >
              {{ trigger_id == 'button2' and press_type == 'long_press' }}
        sequence:
          - repeat:
              count: 100  # safety cap; mode: restart stops this on long_release
              sequence:
                - action: light.turn_on
                  target:
                    entity_id: !input varmblixt_light
                  data:
                    brightness_step_pct: "{{ -(brightness_step_val | int) }}"
                - delay:
                    milliseconds: "{{ repeat_delay_val | int }}"

      # -------------------------------------------------------------
      # BUTTON 2 – LONG RELEASE → stop (mode: restart cancels the loop)
      # -------------------------------------------------------------
      - conditions:
          - condition: template
            value_template: >
              {{ trigger_id == 'button2' and press_type == 'long_release' }}
        sequence: []

      # -------------------------------------------------------------
      # BUTTON 2 – DOUBLE PRESS → previous pastel colour
      # -------------------------------------------------------------
      - conditions:
          - condition: template
            value_template: >
              {{ trigger_id == 'button2' and press_type == 'multi_press_2' }}
        sequence:
          - action: light.turn_on
            target:
              entity_id: !input varmblixt_light
            data:
              rgb_color: >
                {{ pastel_colours[(current_idx - 1) % (pastel_colours | length)] }}

mode: restart
